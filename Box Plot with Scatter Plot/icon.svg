<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="#2A5FAF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left box plot (narrow box, thin lines) -->
  <rect x="18" y="26" width="20" height="44" rx="2" fill="#4D94F8" fill-opacity="0.20" stroke="#2A5FAF"/>
  <!-- Median line (white for contrast) -->
  <line x1="20" y1="48" x2="36" y2="48" stroke="#FFFFFF" />
  <!-- Whiskers -->
  <line x1="28" y1="14" x2="28" y2="26" />
  <line x1="28" y1="70" x2="28" y2="82" />
  <!-- Whisker caps -->
  <line x1="22" y1="14" x2="34" y2="14" />
  <line x1="22" y1="82" x2="34" y2="82" />
  <!-- Scatter points: micro open dots -->
  <circle cx="21.5" cy="32" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="26.5" cy="39" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="32.0" cy="44" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="24.5" cy="58" r="0.8" fill="none" stroke="#2A5FAF" />
  <!-- Right box plot -->
  <rect x="58" y="22" width="20" height="48" rx="2" fill="#4D94F8" fill-opacity="0.20" stroke="#2A5FAF"/>
  <!-- Median line -->
  <line x1="60" y1="46" x2="76" y2="46" stroke="#FFFFFF" />
  <!-- Whiskers -->
  <line x1="68" y1="10" x2="68" y2="22" />
  <line x1="68" y1="70" x2="68" y2="86" />
  <!-- Whisker caps -->
  <line x1="62" y1="10" x2="74" y2="10" />
  <line x1="62" y1="86" x2="74" y2="86" />
  <!-- Scatter points: micro open dots -->
  <circle cx="61.5" cy="28" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="66.8" cy="35" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="72.0" cy="52" r="0.8" fill="none" stroke="#2A5FAF" />
  <circle cx="64.5" cy="60" r="0.8" fill="none" stroke="#2A5FAF" />
  <!-- Tiny outlier cross (subtle) -->
  <line x1="83.0" y1="16" x2="84.6" y2="14.4" stroke="#D32F2F" />
  <line x1="83.0" y1="14.4" x2="84.6" y2="16" stroke="#D32F2F" />
</svg>